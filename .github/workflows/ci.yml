name: ci
on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.filter.outputs.go }}
      webui: ${{ steps.filter.outputs.webui }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - 'Makefile'
              - 'cmd/**'
              - 'internal/**'
              - 'integration/**'
              - 'packaging/**'
            webui:
              - 'webui/**'

  codeql-go:
    needs: [changes, webui-build]
    if: github.event_name == 'push' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download WebUI dist artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: webui-dist
          path: internal/webui/dist
      - uses: github/codeql-action/init@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        with:
          languages: go
          build-mode: manual
      - name: Build for CodeQL analysis
        run: make build-codeql
      - uses: github/codeql-action/analyze@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5

  codeql-webui:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.webui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: webui/package-lock.json
      - uses: github/codeql-action/init@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml
      - name: Install webui dependencies
        run: npm ci
        working-directory: webui
      - uses: github/codeql-action/analyze@c793b717bc78562f491db7b0e93a3a178b099162 # v4.32.5

  lint:
    needs: [changes, webui-build]
    if: github.event_name == 'push' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download WebUI dist artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: webui-dist
          path: internal/webui/dist

      - name: Verify tidy
        run: |
          go mod tidy
          git diff --exit-code

      - name: Lint
        if: needs.changes.outputs.go == 'true'
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.10.1

  vuln-check:
    needs: [changes, webui-build]
    if: github.event_name == 'push' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Download WebUI dist artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: webui-dist
          path: internal/webui/dist
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  test:
    needs: [changes, webui-build]
    if: github.event_name == 'push' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      coverage-total: ${{ steps.coverage.outputs.total }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download WebUI dist artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: webui-dist
          path: internal/webui/dist

      - name: Test
        run: go test -v -race -coverprofile=coverage.txt ./...

      - name: Compute coverage
        id: coverage
        run: |
          go tool cover -func=coverage.txt > /tmp/coverage-func.txt
          echo "total=$(grep ^total /tmp/coverage-func.txt | awk '{print $3}')" >> $GITHUB_OUTPUT

      - name: Check coverage threshold
        env:
          COVERAGE_TOTAL: ${{ steps.coverage.outputs.total }}
        run: |
          THRESHOLD=70
          PCT="${COVERAGE_TOTAL%\%}"
          COVERAGE="${PCT%.*}"
          echo "Total coverage: ${COVERAGE}% (threshold: ${THRESHOLD}%)"
          if [ "$COVERAGE" -lt "$THRESHOLD" ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"

      - name: Build coverage comment body
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        id: coverage-comment
        env:
          COVERAGE_TOTAL: ${{ steps.coverage.outputs.total }}
        run: |
          PCT="${COVERAGE_TOTAL%\%}"
          if awk "BEGIN{exit !($PCT >= 80)}"; then INDICATOR="🟢"
          elif awk "BEGIN{exit !($PCT >= 60)}"; then INDICATOR="🟡"
          else INDICATOR="🔴"; fi

          TABLE_ROWS=$(grep -v '^total:' /tmp/coverage-func.txt | awk '{
            split($0, parts, "\t")
            file=parts[1]; fn=parts[2]; cov=parts[3]
            gsub(/^[[:space:]]+|[[:space:]]+$/, "", fn)
            gsub(/^[[:space:]]+|[[:space:]]+$/, "", cov)
            if (file != "" && fn != "" && cov != "") print "| `" file "` | `" fn "` | " cov " |"
          }')

          {
            echo 'body<<COVERAGE_EOF'
            echo "<!-- quadsyncd-coverage-report -->"
            echo "## 📊 Go Code Coverage"
            echo ""
            echo "${INDICATOR} Total coverage: **${COVERAGE_TOTAL}**"
            echo ""
            echo "<details>"
            echo "<summary>Per-function coverage breakdown</summary>"
            echo ""
            echo "| File | Function | Coverage |"
            echo "|------|----------|----------|"
            echo "$TABLE_ROWS"
            echo "</details>"
            echo ""
            echo "_Coverage report generated by GitHub Actions_"
            echo 'COVERAGE_EOF'
          } >> $GITHUB_OUTPUT

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: coverage-report
          message: ${{ steps.coverage-comment.outputs.body }}

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Integration Tests (Tier 1)
        run: go test -tags=integration ./integration/tier1 -v

  webui-test:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.webui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      coverage-total: ${{ steps.coverage.outputs.total }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Install webui dependencies
        run: npm ci
        working-directory: webui

      - name: Run webui tests with coverage
        run: npm run test:ci
        working-directory: webui

      - name: Extract coverage total
        id: coverage
        run: |
          TOTAL=$(node -e "const s=require('./coverage/coverage-summary.json');const t=s.total;const pct=Math.round((t.lines.covered/t.lines.total)*100);console.log(pct+'%')")
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
        working-directory: webui

      - name: Build coverage comment body
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        id: coverage-comment
        env:
          COVERAGE_TOTAL: ${{ steps.coverage.outputs.total }}
        run: |
          PCT="${COVERAGE_TOTAL%\%}"
          if awk "BEGIN{exit !($PCT >= 80)}"; then INDICATOR="🟢"
          elif awk "BEGIN{exit !($PCT >= 60)}"; then INDICATOR="🟡"
          else INDICATOR="🔴"; fi
          {
            echo 'body<<WEBUI_COVERAGE_EOF'
            echo "<!-- quadsyncd-webui-coverage-report -->"
            echo "## 📊 WebUI Code Coverage"
            echo ""
            echo "${INDICATOR} Total line coverage: **${COVERAGE_TOTAL}**"
            echo ""
            echo "_Coverage report generated by GitHub Actions_"
            echo 'WEBUI_COVERAGE_EOF'
          } >> $GITHUB_OUTPUT

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: webui-coverage-report
          message: ${{ steps.coverage-comment.outputs.body }}

  webui-build:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.webui == 'true' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.x'
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Build web UI
        run: make build-webui

      - name: Upload WebUI dist artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: webui-dist
          path: internal/webui/dist
          retention-days: 1

  build:
    needs: [codeql-go, codeql-webui, lint, vuln-check, test, integration-test, webui-build, webui-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: darwin
            goarch: amd64
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download WebUI dist artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: webui-dist
          path: internal/webui/dist

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -o quadsyncd-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/quadsyncd

  coverage-badge:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine badge color
        id: badge-color
        env:
          COVERAGE_TOTAL: ${{ needs.test.outputs.coverage-total }}
        run: |
          PCT="${COVERAGE_TOTAL%\%}"
          if awk "BEGIN{exit !($PCT >= 80)}"; then COLOR="brightgreen"
          elif awk "BEGIN{exit !($PCT >= 60)}"; then COLOR="yellow"
          else COLOR="red"; fi
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Update coverage badge gist
        uses: Schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: c21e340605fb787e3d2e2322296bc756
          filename: coverage.json
          label: coverage
          message: ${{ needs.test.outputs.coverage-total }}
          color: ${{ steps.badge-color.outputs.color }}

  ci-success:
    needs: [codeql-go, codeql-webui, lint, vuln-check, test, integration-test, webui-build, webui-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          failed = [name for name, data in needs.items() if data['result'] in ('failure', 'cancelled')]
          if failed:
              print('The following jobs failed or were cancelled:', ', '.join(failed))
              sys.exit(1)
          print('All required jobs passed or were skipped.')
          "
