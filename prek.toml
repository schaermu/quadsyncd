default_install_hook_types = ["pre-push"]

# Exclude generated/vendor directories from all hooks
exclude = { glob = [
  "target/**",
  "dist/**",
  "webui/node_modules/**",
  "webui/dist/**",
  "internal/webui/dist/**",
] }

# --- Builtin hygiene hooks (fast, no network, no deps) ---
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace", stages = [
    "pre-push",
  ] },
  { id = "end-of-file-fixer", stages = [
    "pre-push",
  ] },
  { id = "check-yaml", stages = [
    "pre-push",
  ] },
  { id = "check-toml", stages = [
    "pre-push",
  ] },
  { id = "check-merge-conflict", stages = [
    "pre-push",
  ] },
  { id = "detect-private-key", stages = [
    "pre-push",
  ] },
]

# --- Go hooks ---
[[repos]]
repo = "local"
hooks = [
  # Format: fast and file-based; gofmt exits non-zero if output differs
  { id = "gofmt", name = "gofmt", language = "system", entry = "gofmt -l -e", files = '\\.go$', stages = [
    "pre-push",
  ] },
  # Lint: run on the full module; pass_filenames=false because golangci-lint
  # discovers files itself via the ./... pattern
  { id = "golangci-lint", name = "golangci-lint", language = "system", entry = "golangci-lint run", pass_filenames = false, files = '\\.go$', stages = [
    "pre-push",
  ] },
  # Tests: run with race detector on the full module
  { id = "go-test", name = "go test", language = "system", entry = "go test -race ./...", pass_filenames = false, files = '\\.go$', stages = [
    "pre-push",
  ] },
  # Vulnerability scan
  { id = "govulncheck", name = "govulncheck", language = "system", entry = "go run golang.org/x/vuln/cmd/govulncheck@latest ./...", pass_filenames = false, files = '\\.go$', stages = [
    "pre-push",
  ] },
]
